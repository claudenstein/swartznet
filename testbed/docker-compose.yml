# SwartzNet Layer-B testbed — multi-container scenarios.
#
# Usage:
#   # Build the binary first:
#   scripts/build-release.sh testbed
#
#   # Healthy 3-node scenario (no network emulation):
#   docker-compose up --build
#
#   # With netem (home DSL simulation):
#   NETEM_PROFILE=/netem/home-dsl.sh docker-compose up --build
#
#   # Run the observer-side scenario script:
#   testbed/scenarios/s1-healthy-search.sh
#
# All nodes run in --regtest mode so publisher/companion timings
# are accelerated. No real mainline DHT is contacted.
#
# Topology:
#   seed-1, seed-2  — ROLE=seed, pre-populated with
#                     /fixture/content and started with
#                     `swartznet add /fixture/fixture.torrent`.
#                     Both hold identical content so the leech
#                     has two sources.
#   leech-1         — ROLE=leech, starts empty, receives the
#                     same magnet URI with an `x.pe=` peer hint
#                     pointing at seed-1 so it can bootstrap
#                     without DHT or trackers.
#
# The network "swartznet" is a Docker bridge. Nodes discover
# each other by hostname (seed-1, seed-2, leech-1). Each node's
# HTTP API is exposed on localhost at different ports so the
# scenario scripts can probe them individually.

services:
  seed-1:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-seed-1
    hostname: seed-1
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=seed
    ports:
      - "17654:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN  # required for tc netem
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      /fixture/fixture.torrent
    networks:
      swartznet:
        ipv4_address: 172.27.0.2

  seed-2:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-seed-2
    hostname: seed-2
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=seed
    ports:
      - "17655:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      /fixture/fixture.torrent
    networks:
      swartznet:
        ipv4_address: 172.27.0.3

  leech-1:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-leech-1
    hostname: leech-1
    depends_on:
      - seed-1
      - seed-2
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=leech
    ports:
      - "17656:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN
    # Peer-address hints use dotted-quad IPs because anacrolix's
    # StringAddr dialer feeds x.pe= entries through its peer list
    # without eager DNS resolution; hostnames have been observed
    # to silently drop. See docker-compose.swarm.yml for the same
    # reasoning in the 6-node stack.
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      "magnet:?xt=urn:btih:c4405d27af8462e3d5e03c30c542f66e170fe4f8&dn=testbed-fixture-book&x.pe=172.27.0.2:42069&x.pe=172.27.0.3:42069"
    networks:
      swartznet:
        ipv4_address: 172.27.0.4

networks:
  swartznet:
    driver: bridge
    ipam:
      driver: default
      config:
        # Distinct subnet from docker-compose.swarm.yml (172.28.0.0/24)
        # so the two stacks can coexist on the same host during
        # debugging, though running simultaneously is still not
        # supported (scenarios assume known container names).
        - subnet: 172.27.0.0/24
          gateway: 172.27.0.1
