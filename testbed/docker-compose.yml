# SwartzNet Layer-B testbed — multi-container scenarios.
#
# Usage:
#   # Build the binary first:
#   scripts/build-release.sh testbed
#
#   # Healthy 3-node scenario (no network emulation):
#   docker-compose up --build
#
#   # With netem (home DSL simulation):
#   NETEM_PROFILE=/netem/home-dsl.sh docker-compose up --build
#
#   # Run the observer-side scenario script:
#   testbed/scenarios/s1-healthy-search.sh
#
# All nodes run in --regtest mode so publisher/companion timings
# are accelerated. No real mainline DHT is contacted.
#
# Topology:
#   seed-1, seed-2  — ROLE=seed, pre-populated with
#                     /fixture/content and started with
#                     `swartznet add /fixture/fixture.torrent`.
#                     Both hold identical content so the leech
#                     has two sources.
#   leech-1         — ROLE=leech, starts empty, receives the
#                     same magnet URI with an `x.pe=` peer hint
#                     pointing at seed-1 so it can bootstrap
#                     without DHT or trackers.
#
# The network "swartznet" is a Docker bridge. Nodes discover
# each other by hostname (seed-1, seed-2, leech-1). Each node's
# HTTP API is exposed on localhost at different ports so the
# scenario scripts can probe them individually.

services:
  seed-1:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-seed-1
    hostname: seed-1
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=seed
    ports:
      - "17654:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN  # required for tc netem
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      /fixture/fixture.torrent
    networks:
      - swartznet

  seed-2:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-seed-2
    hostname: seed-2
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=seed
    ports:
      - "17655:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      /fixture/fixture.torrent
    networks:
      - swartznet

  leech-1:
    build:
      context: ..
      dockerfile: testbed/Dockerfile
    container_name: sn-leech-1
    hostname: leech-1
    depends_on:
      - seed-1
      - seed-2
    environment:
      - NETEM_PROFILE=${NETEM_PROFILE:-}
      - ROLE=leech
    ports:
      - "17656:7654"
    volumes:
      - ./netem:/netem:ro
    cap_add:
      - NET_ADMIN
    command: >
      swartznet add --regtest --no-dht
      --data-dir=/data --api-addr=0.0.0.0:7654
      "magnet:?xt=urn:btih:c4405d27af8462e3d5e03c30c542f66e170fe4f8&dn=testbed-fixture-book&x.pe=seed-1:42069&x.pe=seed-2:42069"
    networks:
      - swartznet

networks:
  swartznet:
    driver: bridge
