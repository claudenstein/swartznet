name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Verify go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: gofmt check
        run: |
          gofmt_out=$(gofmt -l -s .)
          if [ -n "$gofmt_out" ]; then
            echo "::error::gofmt would reformat the following files:"
            echo "$gofmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...
        timeout-minutes: 15
