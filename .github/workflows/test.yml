name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Verify go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: gofmt check
        run: |
          # research/ holds vendored upstream clones (libtorrent,
          # transmission, anacrolix/torrent, etc.) — not our code.
          # Only check our own directories.
          gofmt_out=$(gofmt -l -s cmd/ internal/)
          if [ -n "$gofmt_out" ]; then
            echo "::error::gofmt would reformat the following files:"
            echo "$gofmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: |
          # Exclude internal/testlab — those are integration
          # scenarios that spin up multiple anacrolix clients on
          # loopback with real piece-verify logic. They work in
          # isolation but are unreliable under the compute and
          # network constraints of a shared CI runner. Run them
          # locally with:
          #   go test -race ./internal/testlab/...
          pkgs=$(go list ./... | grep -v '/internal/testlab$')
          go test -race -count=1 $pkgs
        timeout-minutes: 15
